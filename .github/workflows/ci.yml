name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  fuzz:
    name: fuzz (short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: fuzz verification parser
        run: go test -run=- -fuzz=FuzzVerifyParse -fuzztime=30s ./verification
      - name: fuzz jwks decoder
        run: go test -run=- -fuzz=FuzzJWKSDecode -fuzztime=30s ./jwks
      - name: fuzz claims ToMapClaims
        run: go test -run=- -fuzz=FuzzToMapClaims -fuzztime=30s ./claims
