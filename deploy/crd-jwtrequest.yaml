apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: jwtrequests.jwtmint.io
spec:
  group: jwtmint.io
  names:
    kind: JWTRequest
    listKind: JWTRequestList
    plural: jwtrequests
    singular: jwtrequest
    shortNames:
      - jwtreq
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - secretName
              properties:
                secretName:
                  type: string
                  description: Name of the Secret that holds the minted token.
                subject:
                  type: string
                issuer:
                  type: string
                audience:
                  type: array
                  items: { type: string }
                groups:
                  type: array
                  items: { type: string }
                roles:
                  type: array
                  items: { type: string }
                entitlements:
                  type: array
                  items: { type: string }
                extraClaims:
                  type: object
                  description: |
                    Arbitrary claims to embed in the minted JWT. Each value is preserved
                    as raw JSON so callers can express strings, numbers, booleans, arrays,
                    or nested objects. Reserved registered claims (exp, iat, nbf, jti, iss,
                    aud, sub) are ignored — set those via dedicated fields. Values that
                    fail JSON parsing are surfaced via the ClaimsAccepted condition.
                  x-kubernetes-preserve-unknown-fields: true
                expiresIn:
                  type: string
                  description: Go duration string for token lifetime (e.g. "1h").
                refreshThreshold:
                  type: number
                  description: Re-mint when remaining lifetime < this fraction of total. Defaults 0.25.
            status:
              type: object
              properties:
                secretName: { type: string }
                lastMintedAt: { type: string, format: date-time }
                expiresAt: { type: string, format: date-time }
                jti: { type: string }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string, enum: [True, False, Unknown] }
                      lastTransitionTime: { type: string, format: date-time }
                      reason: { type: string }
                      message: { type: string }
                      observedGeneration: { type: integer }
      additionalPrinterColumns:
        - name: Secret
          type: string
          jsonPath: .status.secretName
        - name: Expires
          type: date
          jsonPath: .status.expiresAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
